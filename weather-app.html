<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #87CEEB;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border: 2px solid black;
        }

        h1 {
            font-size: 30px;
            margin-bottom: 20px;
            color: black;
        }

        .search-box {
            margin-bottom: 15px;
        }

        input {
            padding: 8px;
            width: 200px;
            border: 1px solid black;
            font-size: 14px;
        }

        button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
            margin-left: 5px;
        }

        button:hover {
            background-color: #45a049;
        }

        .api-section {
            margin-bottom: 20px;
            background-color: #f0f0f0;
            padding: 10px;
            border: 1px solid gray;
        }

        .api-section label {
            display: block;
            margin-bottom: 5px;
            color: black;
        }

        .api-section input {
            width: 100%;
            padding: 8px;
            border: 1px solid black;
        }

        .error-message {
            color: red;
            margin: 10px 0;
            display: none;
            font-weight: bold;
        }

        .error-message.show {
            display: block;
        }

        .weather-info {
            display: none;
            background-color: #ffffcc;
            padding: 20px;
            border: 2px solid black;
            margin-top: 20px;
        }

        .weather-info.show {
            display: block;
        }

        .city-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .temperature {
            font-size: 48px;
            font-weight: bold;
            color: #FF6600;
            margin: 15px 0;
        }

        .condition {
            font-size: 18px;
            margin: 10px 0;
        }

        .details {
            margin-top: 20px;
            text-align: left;
        }

        .detail-item {
            padding: 8px;
            margin: 5px 0;
            background-color: white;
            border: 1px solid gray;
        }

        .loading {
            display: none;
            font-weight: bold;
            color: blue;
        }

        .loading.show {
            display: block;
        }

        .no-data {
            display: block;
            color: gray;
            font-size: 16px;
        }

        .no-data.show {
            display: block;
        }

        .toggle-buttons {
            margin: 15px 0;
        }

        .toggle-btn {
            padding: 8px 15px;
            background-color: #e0e0e0;
            border: 1px solid black;
            cursor: pointer;
            margin: 0 5px;
        }

        .toggle-btn.active {
            background-color: #FFD700;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Weather App</h1>

        <div class="api-section">
            <label for="apiKey">API Key:</label>
            <input type="password" id="apiKey" placeholder="Enter API key from openweathermap.org">
        </div>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name">
            <button id="searchBtn">Search</button>
        </div>

        <div class="toggle-buttons">
            <button class="toggle-btn active" data-unit="celsius" id="celsiusBtn">°C</button>
            <button class="toggle-btn" data-unit="fahrenheit" id="fahrenheitBtn">°F</button>
        </div>

        <div class="loading" id="spinner">Loading...</div>

        <div class="error-message" id="errorMessage"></div>

        <div class="weather-info" id="weatherInfo">
            <div class="city-name" id="cityName">---</div>
            <div class="temperature">
                <span id="temperature">--</span>°<span id="tempUnit">C</span>
            </div>
            <div class="condition" id="condition">---</div>
            <div class="details">
                <div class="detail-item">Humidity: <span id="humidity">--</span>%</div>
                <div class="detail-item">Wind Speed: <span id="windSpeed">--</span> <span id="windUnit">km/h</span></div>
                <div class="detail-item">Visibility: <span id="visibility">--</span> km</div>
                <div class="detail-item">Pressure: <span id="pressure">--</span> hPa</div>
            </div>
        </div>

        <div class="no-data" id="noData">Search for a city to see weather</div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const spinner = document.getElementById('spinner');
        const errorMessage = document.getElementById('errorMessage');
        const weatherInfo = document.getElementById('weatherInfo');
        const noData = document.getElementById('noData');
        const celsiusBtn = document.getElementById('celsiusBtn');
        const fahrenheitBtn = document.getElementById('fahrenheitBtn');

        let currentUnit = 'celsius';
        let currentTemp = 0;

        searchBtn.addEventListener('click', function() {
            const city = cityInput.value;
            const apiKey = apiKeyInput.value;

            if (!city) {
                errorMessage.textContent = 'Please enter a city name';
                errorMessage.classList.add('show');
                return;
            }

            if (!apiKey) {
                errorMessage.textContent = 'Please enter API key';
                errorMessage.classList.add('show');
                return;
            }

            spinner.classList.add('show');
            errorMessage.classList.remove('show');

            fetch('https://api.openweathermap.org/data/2.5/weather?q=' + city + '&appid=' + apiKey + '&units=metric')
                .then(response => response.json())
                .then(data => {
                    if (data.cod === 200) {
                        currentTemp = data.main.temp;
                        showWeather(data);
                        spinner.classList.remove('show');
                        noData.style.display = 'none';
                    } else {
                        errorMessage.textContent = 'City not found';
                        errorMessage.classList.add('show');
                        spinner.classList.remove('show');
                    }
                })
                .catch(error => {
                    errorMessage.textContent = 'Error: ' + error;
                    errorMessage.classList.add('show');
                    spinner.classList.remove('show');
                });
        });

        function showWeather(data) {
            const temp = data.main.temp;
            const humidity = data.main.humidity;
            const windSpeed = (data.wind.speed * 3.6).toFixed(1);
            const visibility = (data.visibility / 1000).toFixed(1);
            const pressure = data.main.pressure;
            const condition = data.weather[0].main;

            document.getElementById('cityName').textContent = data.name + ', ' + data.sys.country;
            document.getElementById('condition').textContent = 'Condition: ' + condition;
            document.getElementById('humidity').textContent = humidity;
            document.getElementById('pressure').textContent = pressure;
            document.getElementById('visibility').textContent = visibility;
            document.getElementById('windSpeed').textContent = windSpeed;

            if (currentUnit === 'celsius') {
                document.getElementById('temperature').textContent = Math.round(temp);
                document.getElementById('tempUnit').textContent = 'C';
            } else {
                document.getElementById('temperature').textContent = Math.round(temp * 9/5 + 32);
                document.getElementById('tempUnit').textContent = 'F';
            }

            weatherInfo.classList.add('show');
        }

        celsiusBtn.addEventListener('click', function() {
            currentUnit = 'celsius';
            celsiusBtn.classList.add('active');
            fahrenheitBtn.classList.remove('active');
            
            if (weatherInfo.classList.contains('show')) {
                document.getElementById('temperature').textContent = Math.round(currentTemp);
                document.getElementById('tempUnit').textContent = 'C';
            }
        });

        fahrenheitBtn.addEventListener('click', function() {
            currentUnit = 'fahrenheit';
            fahrenheitBtn.classList.add('active');
            celsiusBtn.classList.remove('active');
            
            if (weatherInfo.classList.contains('show')) {
                document.getElementById('temperature').textContent = Math.round(currentTemp * 9/5 + 32);
                document.getElementById('tempUnit').textContent = 'F';
            }
        });

        cityInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                searchBtn.click();
            }
        });
    </script>
</body>
</html>
