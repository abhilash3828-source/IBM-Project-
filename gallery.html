<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Gallery - WeatherVibe</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .nav-links a:hover {
            color: #ffd60a;
        }

        /* Hamburger Menu */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
            background: none;
            border: none;
            padding: 10px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: #fff;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(10px, 10px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideUp 0.6s ease-out;
        }

        .page-title {
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .page-subtitle {
            font-size: 18px;
            opacity: 0.9;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            animation: fadeIn 0.6s ease-out 0.2s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .city-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            height: 100%;
        }

        .city-card:hover {
            transform: translateY(-15px);
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffd60a;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
        }

        .city-card-header {
            background: linear-gradient(135deg, rgba(255, 214, 10, 0.2), rgba(255, 193, 0, 0.2));
            padding: 25px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .city-emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .city-name {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .city-country {
            font-size: 13px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .city-card-body {
            padding: 25px;
        }

        .temp-display {
            font-size: 48px;
            font-weight: 800;
            color: #ffd60a;
            margin-bottom: 10px;
            line-height: 1;
        }

        .weather-condition {
            font-size: 16px;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .detail {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-label {
            font-size: 11px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 700;
            color: #ffd60a;
        }

        .search-section {
            margin-bottom: 40px;
            animation: slideUp 0.6s ease-out;
        }

        .search-input {
            width: 100%;
            padding: 16px 25px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            font-size: 16px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffd60a;
            box-shadow: 0 0 20px rgba(255, 214, 10, 0.3);
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.8;
        }

        .no-results-emoji {
            font-size: 64px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .container {
                max-width: 100%;
                padding: 15px;
            }

            .page-title {
                font-size: 42px;
            }

            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
            }

            .temp-display {
                font-size: 40px;
            }

            .city-name {
                font-size: 22px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .container {
                max-width: 100%;
            }

            /* Navigation */
            nav {
                padding: 15px 0;
                margin-bottom: 30px;
            }

            .logo {
                font-size: 22px;
                gap: 8px;
            }

            .hamburger {
                display: flex;
            }

            .nav-links {
                position: absolute;
                top: 70px;
                left: 0;
                right: 0;
                flex-direction: column;
                gap: 0;
                background: rgba(102, 126, 234, 0.95);
                backdrop-filter: blur(10px);
                list-style: none;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease;
                border-bottom: 2px solid rgba(255, 255, 255, 0.1);
                z-index: 1000;
            }

            .nav-links.active {
                max-height: 300px;
            }

            .nav-links li {
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }

            .nav-links a {
                display: block;
                padding: 15px 20px;
                color: rgba(255, 255, 255, 0.9);
                font-size: 16px;
            }

            .nav-links a:hover {
                background: rgba(255, 255, 255, 0.1);
            }

            .page-header {
                margin-bottom: 35px;
            }

            .page-title {
                font-size: 32px;
                margin-bottom: 12px;
            }

            .page-subtitle {
                font-size: 14px;
            }

            .search-section {
                margin-bottom: 30px;
            }

            .search-input {
                padding: 14px 20px;
                font-size: 15px;
            }

            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 15px;
            }

            .city-card-header {
                padding: 20px;
            }

            .city-emoji {
                font-size: 40px;
                margin-bottom: 8px;
            }

            .city-name {
                font-size: 20px;
                margin-bottom: 3px;
            }

            .city-country {
                font-size: 12px;
            }

            .city-card-body {
                padding: 20px;
            }

            .temp-display {
                font-size: 36px;
                margin-bottom: 8px;
            }

            .weather-condition {
                font-size: 15px;
                margin-bottom: 15px;
            }

            .weather-details {
                gap: 10px;
            }

            .detail {
                padding: 10px;
            }

            .detail-label {
                font-size: 10px;
                margin-bottom: 3px;
            }

            .detail-value {
                font-size: 14px;
            }

            .no-results {
                padding: 40px 20px;
            }

            .no-results-emoji {
                font-size: 48px;
                margin-bottom: 15px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
                font-size: 14px;
            }

            .container {
                max-width: 100%;
            }

            /* Navigation */
            nav {
                padding: 12px 0;
                margin-bottom: 20px;
            }

            .logo {
                font-size: 18px;
                gap: 6px;
                letter-spacing: 1px;
            }

            .hamburger span {
                width: 22px;
                height: 2.5px;
            }

            .page-header {
                margin-bottom: 25px;
            }

            .page-title {
                font-size: 24px;
                margin-bottom: 10px;
            }

            .page-subtitle {
                font-size: 13px;
            }

            .search-section {
                margin-bottom: 25px;
            }

            .search-input {
                padding: 12px 18px;
                font-size: 14px;
            }

            .search-input::placeholder {
                font-size: 13px;
            }

            .gallery {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .city-card {
                border-radius: 20px;
            }

            .city-card-header {
                padding: 18px;
                border-radius: 20px 20px 0 0;
            }

            .city-emoji {
                font-size: 36px;
                margin-bottom: 6px;
            }

            .city-name {
                font-size: 18px;
                margin-bottom: 2px;
            }

            .city-country {
                font-size: 11px;
            }

            .city-card-body {
                padding: 18px;
            }

            .temp-display {
                font-size: 32px;
                margin-bottom: 6px;
            }

            .weather-condition {
                font-size: 14px;
                margin-bottom: 12px;
            }

            .weather-details {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .detail {
                padding: 8px;
                border-radius: 8px;
            }

            .detail-label {
                font-size: 9px;
                margin-bottom: 2px;
            }

            .detail-value {
                font-size: 13px;
            }

            .no-results {
                padding: 30px 15px;
            }

            .no-results-emoji {
                font-size: 40px;
                margin-bottom: 12px;
            }

            .no-results p {
                font-size: 14px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 10px;
            }

            .page-title {
                font-size: 20px;
            }

            .gallery {
                grid-template-columns: 1fr;
            }

            .temp-display {
                font-size: 28px;
            }

            .city-name {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav>
            <div class="logo">
                <i class="fas fa-cloud"></i> WeatherVibe
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="weather.html">App</a></li>
                <li><a href="features.html">Features</a></li>
                <li><a href="gallery.html">Gallery</a></li>
            </ul>
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>

        <!-- Header -->
        <div class="page-header">
            <h1 class="page-title">🌍 World Weather Gallery</h1>
            <p class="page-subtitle">Check weather vibes from popular cities around the globe</p>
        </div>

        <!-- Search -->
        <div class="search-section">
            <input type="text" class="search-input" id="searchInput" placeholder="Search cities by name...">
        </div>

        <!-- Gallery -->
        <div class="gallery" id="gallery">
            <!-- Cities will be populated by JavaScript -->
        </div>

        <div class="no-results" id="noResults" style="display: none;">
            <div class="no-results-emoji">🔍</div>
            <p>No cities found. Try searching again!</p>
        </div>
    </div>

    <script>
        const cities = [
            { name: 'London', country: 'UK', emoji: '🇬🇧', temp: 18, condition: 'Cloudy' },
            { name: 'Tokyo', country: 'Japan', emoji: '🇯🇵', temp: 22, condition: 'Clear' },
            { name: 'New York', country: 'USA', emoji: '🗽', temp: 20, condition: 'Partly Cloudy' },
            { name: 'Paris', country: 'France', emoji: '🇫🇷', temp: 19, condition: 'Sunny' },
            { name: 'Dubai', country: 'UAE', emoji: '🏜️', temp: 35, condition: 'Hot & Clear' },
            { name: 'Sydney', country: 'Australia', emoji: '🇦🇺', temp: 25, condition: 'Windy' },
            { name: 'Toronto', country: 'Canada', emoji: '🇨🇦', temp: 15, condition: 'Rainy' },
            { name: 'Singapore', country: 'Singapore', emoji: '🌴', temp: 28, condition: 'Humid' },
            { name: 'Berlin', country: 'Germany', emoji: '🇩🇪', temp: 16, condition: 'Cloudy' },
            { name: 'Bangkok', country: 'Thailand', emoji: '🇹🇭', temp: 30, condition: 'Tropical' },
            { name: 'Mexico City', country: 'Mexico', emoji: '🌮', temp: 23, condition: 'Clear' },
            { name: 'Mumbai', country: 'India', emoji: '🇮🇳', temp: 32, condition: 'Humid' },
        ];

        const gallery = document.getElementById('gallery');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');

        function renderGallery(citiesToRender) {
            gallery.innerHTML = '';

            if (citiesToRender.length === 0) {
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';

            citiesToRender.forEach((city, index) => {
                const card = document.createElement('div');
                card.className = 'city-card';
                card.style.animation = `slideUp 0.6s ease-out ${0.1 + index * 0.05}s both`;
                
                card.innerHTML = `
                    <div class="city-card-header">
                        <div class="city-emoji">${city.emoji}</div>
                        <div class="city-name">${city.name}</div>
                        <div class="city-country">${city.country}</div>
                    </div>
                    <div class="city-card-body">
                        <div class="temp-display">${city.temp}°C</div>
                        <div class="weather-condition">${city.condition}</div>
                        <div class="weather-details">
                            <div class="detail">
                                <div class="detail-label">💧 Humidity</div>
                                <div class="detail-value">${65 + Math.random() * 30 | 0}%</div>
                            </div>
                            <div class="detail">
                                <div class="detail-label">💨 Wind</div>
                                <div class="detail-value">${15 + Math.random() * 20 | 0} km/h</div>
                            </div>
                            <div class="detail">
                                <div class="detail-label">🔽 Pressure</div>
                                <div class="detail-value">${1000 + Math.random() * 30 | 0} hPa</div>
                            </div>
                            <div class="detail">
                                <div class="detail-label">👁️ Visibility</div>
                                <div class="detail-value">${8 + Math.random() * 2 | 0} km</div>
                            </div>
                        </div>
                    </div>
                `;
                
                gallery.appendChild(card);
            });
        }

        function filterCities(searchTerm) {
            const filtered = cities.filter(city => 
                city.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                city.country.toLowerCase().includes(searchTerm.toLowerCase())
            );
            renderGallery(filtered);
        }

        // Initial render
        renderGallery(cities);

        // Search functionality
        searchInput.addEventListener('input', (e) => {
            filterCities(e.target.value);
        });

        // Add keyframe animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        `;
        document.head.appendChild(style);

        // Hamburger Menu Toggle
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        // Close menu when a link is clicked
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
            });
        });

        // Close menu on window resize
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
            }
        });
    </script>
</body>
</html>
